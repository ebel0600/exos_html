<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <title>Mon premier formulaire</title>
    </head>

    <body>
        <div>
            <h1>Formulaire d'inscription</h1>
            <h2>Votre compte configuré en 2 minutes !</h2>
        </div>
        <form action="/ma_page_de_traitement.txt" method="post">
            <ul>
                <li>
                    <label for="name">Nom :</label>
                    <input type="text" id="name" name="user_name" />
                </li>
                <li>
                    <label for="1stname">Prénom :</label>
                    <input type="text" id="1stname" name="user_1stname" />
                </li>
                <li>
                    <label for="birthday">Date de naissance</label>
                    <input type="date" id="birthday" name="user_birthday" />
                </li>
            </ul>
        </form>
    </body>
</html>
