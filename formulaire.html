<!DOCTYPE html>
<html lang="fr-FR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon premier formulaire</title>
    <meta name="description" content="apprentissage pedagogie formulaire html">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Formulaire d'inscription</h1>
    <h2>Votre compte configuré en 2 minutes !</h2>
    <form action="formulaire.html" method="GET" enctype="application/x-www-form-urlencoded">
        <fieldset>
            <legend>Etat civil</legend>
            <label for="name">Nom :</label>
            <input type="text" id="name" name="user_name" />
            <br>
            <label for="1stname">Prénom :</label>
            <input type="text" id="1stname" name="user_1stname" />
            <br>
            <label for="birthday">Date de naissance</label>
            <input type="date" id="birthday" name="user_birthday" />
        </fieldset>
        <fieldset>
            <legend>Informations de contact</legend>
            <label for="e_mail">Adresse mail :</label>
            <input type="email" id="e_mail" name="user_email" />
            <br>
            <label for="phone">Téléphone :</label>
            <input type="tel" id="phone" name="user_phone" />
        </fieldset>
        <fieldset>
            <button type="button">X</button> J'accepte les <a
                href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">conditions d'utilisation</a>
            <br>
            <button type="submit">S'inscrire</button>
        </fieldset>
    </form>
</body>

</html>
